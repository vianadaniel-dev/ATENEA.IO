<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atenea | Iniciar Sesión</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">

</head>
<body>
    <section id="login" class="login">
        <div class="mensaje_error">
            <i class="bx bx-info-octagon"></i>
            12312
        </div>
        <div id="login-container" class="login__container">
            <div id="login-header" class="login__header">
                <img
                    id="login-logo"
                    class="login__logo"
                    src="src/assets/logos/logo.svg"
                    alt="Logo Atenea">
            </div>
            <div id="login-card" class="login__card">
                <form
                    id="login-form"
                    class="login__form">
                    <h2
                        id="login-title"
                        class="login__title">
                        Sign In
                    </h2>
                    <p
                        id="login-description"
                        class="login__description">
                        Welcome back! Please sign in to continue.
                    </p>
                    <div
                        id="login-username-group"
                        class="login__input-group">
                        <i class="bx bx-envelope"></i>
                        <input
                            id="login-username"
                            class="login__input"
                            type="email"
                            placeholder="Email"
                            autocomplete="off"
                            required>
                    </div>
                    <div
                        id="login-password-group"
                        class="login__input-group">
                        <i class="bx bx-lock"></i>
                        <input
                            id="login-password"
                            class="login__input"
                            type="password"
                            placeholder="Password"
                            autocomplete="off"
                            required>
                    </div>
                    <select
                        id="login-role"
                        class="login__select">
                        <option value="">All</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Administrator</option>
                    </select>
                    <div
                        id="login-options"
                        class="login__options">
                        <input
                            id="login-remember"
                            class="login__checkbox"
                            type="checkbox">
                        <label
                            for="login-remember"
                            id="login-remember-label"
                            class="login__checkbox-label">
                            Remember me
                        </label>
                    </div>
                    <button
                        id="login-button"
                        class="login__button">
                        Login
                    </button>
                </form>
            </div>
        </div>
    </section>
    <script src="src/pages/index.js"></script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
