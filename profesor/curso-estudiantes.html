<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atenea | Lista Estudiantes</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div id="header"></div>
    <div id="sidebar"></div>
    <main class="table-page" id="table-page">
        <div class="table-layout">
            <div class="table-content">
                <div class="table-header" id="table-header">
                    <div class="table-header-title">
                        <span class="table-title">
                            estudiantes
                        </span>

                        <div class="table-header-action">
                            <button class="table-add-button">
                                <i class="bx bx-plus"></i>
                                añadir estudiante
                            </button>
                        </div>
                    </div>

                    <span class="table-total">
                        <span class="table-total-label">
                            <i class="bx bx-user"></i>
                            estudiantes:
                        </span>

                        2,000
                    </span>
                </div>
                <div class="table-card">
                    <div class="table-toolbar">

                        <select class="table-filter">
                            <option>Estado</option>
                            <option>Activo</option>
                            <option>Inactivo</option>
                        </select>

                        <select class="table-filter">
                            <option>Curso</option>
                            <option>9-A</option>
                            <option>10-B</option>
                        </select>

                        <select class="table-filter">
                            <option>Periodo</option>
                            <option>2026-I</option>
                            <option>2026-II</option>
                        </select>

                        <select class="table-filter">
                            <option>Puntos</option>
                            <option>Mayor a 500</option>
                            <option>Menor a 100</option>
                        </select>

                    </div>
                    <div class="table-wrapper">
                        <div class="table-section">
                            <div class="table">
                                <div class="table-container">
                                    <table class="data-table">
                                        <thead class="table-head">
                                            <tr class="table-head-row">
                                                <th class="table-head-cell">ID</th>
                                                <th class="table-head-cell">Estudiante</th>
                                                <th class="table-head-cell">Correo</th>
                                                <th class="table-head-cell">Curso</th>
                                                <th class="table-head-cell">Puntos</th>
                                                <th class="table-head-cell">Estado</th>
                                                <th class="table-head-cell">Acciones</th>
                                            </tr>
                                        </thead>

                                        <tbody class="table-body" id="table-body">
                                            <tr class="table-body-row">
                                                <td class="table-body-cell">#001</td>
                                                <td class="table-body-cell">
                                                    <div class="user-info">
                                                        <div class="user-avatar">JP</div>
                                                        <span class="user-name">Juan Pérez</span>
                                                    </div>
                                                </td>
                                                <td class="table-body-cell">juan.perez@email.com</td>
                                                <td class="table-body-cell">9-A</td>
                                                <td class="table-body-cell">
                                                    <span class="points-value">1,250</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="badge badge--active">
                                                        <i class="bx bx-check-circle"></i> Activo
                                                    </span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <div class="table-actions">
                                                        <button class="btn-action btn-action--view" title="Ver">
                                                            <i class="bx bx-eye"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--edit" title="Editar">
                                                            <i class="bx bx-edit"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--delete" title="Eliminar">
                                                            <i class="bx bx-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr class="table-body-row">
                                                <td class="table-body-cell">#002</td>
                                                <td class="table-body-cell">
                                                    <div class="user-info">
                                                        <div class="user-avatar">MG</div>
                                                        <span class="user-name">María García</span>
                                                    </div>
                                                </td>
                                                <td class="table-body-cell">maria.garcia@email.com</td>
                                                <td class="table-body-cell">10-B</td>
                                                <td class="table-body-cell">
                                                    <span class="points-value points-value--high">3,400</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="badge badge--active">
                                                        <i class="bx bx-check-circle"></i> Activo
                                                    </span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <div class="table-actions">
                                                        <button class="btn-action btn-action--view" title="Ver">
                                                            <i class="bx bx-eye"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--edit" title="Editar">
                                                            <i class="bx bx-edit"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--delete" title="Eliminar">
                                                            <i class="bx bx-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr class="table-body-row">
                                                <td class="table-body-cell">#003</td>
                                                <td class="table-body-cell">
                                                    <div class="user-info">
                                                        <div class="user-avatar">CR</div>
                                                        <span class="user-name">Carlos Rodríguez</span>
                                                    </div>
                                                </td>
                                                <td class="table-body-cell">carlos.rodriguez@email.com</td>
                                                <td class="table-body-cell">8-C</td>
                                                <td class="table-body-cell">
                                                    <span class="points-value points-value--low">45</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="badge badge--pending">
                                                        <i class="bx bx-time"></i> Pendiente
                                                    </span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <div class="table-actions">
                                                        <button class="btn-action btn-action--view" title="Ver">
                                                            <i class="bx bx-eye"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--edit" title="Editar">
                                                            <i class="bx bx-edit"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--delete" title="Eliminar">
                                                            <i class="bx bx-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>

                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                <div class="table-pagination">
                        <div class="pagination">
                            <div class="pagination-left">

                                <i class="bx bx-arrow-to-left-stroke"></i>
                                <i class="bx bx-chevron-left"></i>

                            </div>
                            <span class="pagination-info">

                                page

                                <span class="pagination-current">1</span>

                                of

                                <span class="pagination-total">200</span>

                            </span>
                            <div class="pagination-right">

                                <i class="bx bx-chevron-right"></i>
                                <i class="bx bx-arrow-to-right-stroke"></i>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="/src/pages/profesor/curso-estudiantes.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
