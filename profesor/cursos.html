<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atenea | Cursos</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div id="header"></div>
    <div id="sidebar"></div>
    <main>
         <section class="courses-section">
        <div class="courses-section__header">
            <h2 class="courses-section__title">
                <i class="bx bx-book-open"></i>
                Mis cursos
            </h2>
            <span class="courses-section__badge">6</span>
        </div>

        <div class="courses-grid">

            <!-- Curso 1: Matemáticas -->
            <article class="course-card">
                <div class="course-card__header course-card__header--math">
                    <div class="course-card__icon">
                        <i class="bx bx-calculator"></i>
                    </div>
                    <span class="course-card__badge course-card__badge--active">Activo</span>
                </div>
                <div class="course-card__content">
                    <h3 class="course-card__title">Matemáticas Avanzadas</h3>
                    <p class="course-card__teacher">
                        <i class="bx bx-user"></i> Dr. Martínez
                    </p>
                    <div class="course-card__progress">
                        <div class="course-card__progress-info">
                            <span class="course-card__progress-label">Progreso</span>
                            <span class="course-card__progress-value">75%</span>
                        </div>
                        <div class="course-card__progress-bar">
                            <div class="course-card__progress-fill course-card__progress-fill--high" style="width: 75%"></div>
                        </div>
                    </div>
                    <div class="course-card__stats">
                        <div class="course-card__stat">
                            <i class="bx bx-task"></i>
                            <span>12 tareas</span>
                        </div>
                        <div class="course-card__stat">
                            <i class="bx bx-calendar"></i>
                            <span>Lun - Vie</span>
                        </div>
                    </div>
                </div>
                <div class="course-card__footer">
                    <a class="course-btn course-btn--primary" href="./curso-estudiantes.html">
                        <i class="bx bx-right-arrow"></i> Continuar
                    </a>
                </div>
            </article>
        </div>
    </section>
    </main>
    
    <script type="module" src="/src/pages/profesor/cursos.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
