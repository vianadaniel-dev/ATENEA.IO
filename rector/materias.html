<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atenea | Materias</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div id="header"></div>
    <div id="sidebar"></div>
    <main class="table-page" id="table-page">
        <div class="table-layout">
            <div class="table-content">
                <div class="table-header" id="table-header">
                    <div class="table-header-title">
                        <span class="table-title">
                            materias
                        </span>

                        <div class="table-header-action">
                            <button class="table-add-button">
                                <i class="bx bx-plus"></i>
                                crear materia
                            </button>
                        </div>
                    </div>

                    <span class="table-total">
                        <span class="table-total-label">
                            <i class="bx bx-book"></i>
                            materias:
                        </span>

                        24
                    </span>
                </div>
                <div class="table-card">
                    <div class="table-toolbar">

                        <select class="table-filter">
                            <option>Estado</option>
                            <option>Activa</option>
                            <option>Inactiva</option>
                        </select>

                        <select class="table-filter">
                            <option>Cursos asignados</option>
                            <option>Con cursos</option>
                            <option>Sin cursos</option>
                        </select>

                        <select class="table-filter">
                            <option>Profesor asignado</option>
                            <option>Con profesor</option>
                            <option>Sin profesor</option>
                        </select>

                        <select class="table-filter">
                            <option>Periodo</option>
                            <option>2026-I</option>
                            <option>2026-II</option>
                        </select>

                    </div>
                    <div class="table-wrapper">
                        <div class="table-section">
                            <div class="table">
                                <div class="table-container">
                                    <table class="data-table">
                                        <thead class="table-head">
                                            <tr class="table-head-row">
                                                <th class="table-head-cell">ID</th>
                                                <th class="table-head-cell">Materia</th>
                                                <th class="table-head-cell">Cursos</th>
                                                <th class="table-head-cell">Profesor</th>
                                                <th class="table-head-cell">Estudiantes</th>
                                                <th class="table-head-cell">Estado</th>
                                                <th class="table-head-cell">Acciones</th>
                                            </tr>
                                        </thead>

                                        <tbody class="table-body" id="table-body">
                                            <tr class="table-body-row">
                                                <td class="table-body-cell">#201</td>
                                                <td class="table-body-cell">
                                                    <div class="subject-info">
                                                        <i class="bx bx-calculator subject-icon"></i>
                                                        <span class="subject-name">Matemáticas</span>
                                                    </div>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="courses-count">4</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <div class="user-info">
                                                        <div class="user-avatar">LM</div>
                                                        <span class="user-name">Laura Martínez</span>
                                                    </div>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="students-count">120</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="badge badge--active">
                                                        <i class="bx bx-check-circle"></i> Activa
                                                    </span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <div class="table-actions">
                                                        <button class="btn-action btn-action--view" title="Ver">
                                                            <i class="bx bx-show"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--edit" title="Editar">
                                                            <i class="bx bx-edit"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--delete" title="Eliminar">
                                                            <i class="bx bx-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr class="table-body-row">
                                                <td class="table-body-cell">#202</td>
                                                <td class="table-body-cell">
                                                    <div class="subject-info">
                                                        <i class="bx bx-atom subject-icon"></i>
                                                        <span class="subject-name">Física</span>
                                                    </div>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="courses-count">3</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <div class="user-info">
                                                        <div class="user-avatar">RS</div>
                                                        <span class="user-name">Roberto Sánchez</span>
                                                    </div>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="students-count">85</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="badge badge--active">
                                                        <i class="bx bx-check-circle"></i> Activa
                                                    </span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <div class="table-actions">
                                                        <button class="btn-action btn-action--view" title="Ver">
                                                            <i class="bx bx-show"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--edit" title="Editar">
                                                            <i class="bx bx-edit"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--delete" title="Eliminar">
                                                            <i class="bx bx-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr class="table-body-row">
                                                <td class="table-body-cell">#203</td>
                                                <td class="table-body-cell">
                                                    <div class="subject-info">
                                                        <i class="bx bx-pen subject-icon"></i>
                                                        <span class="subject-name">Gramática</span>
                                                    </div>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="courses-count courses-count--zero">0</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="no-assigned">Sin asignar</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="students-count students-count--zero">0</span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <span class="badge badge--inactive">
                                                        <i class="bx bx-x-circle"></i> Inactiva
                                                    </span>
                                                </td>
                                                <td class="table-body-cell">
                                                    <div class="table-actions">
                                                        <button class="btn-action btn-action--view" title="Ver">
                                                            <i class="bx bx-show"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--edit" title="Editar">
                                                            <i class="bx bx-edit"></i>
                                                        </button>
                                                        <button class="btn-action btn-action--delete" title="Eliminar">
                                                            <i class="bx bx-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>

                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                <div class="table-pagination">
                        <div class="pagination">
                            <div class="pagination-left">

                                <i class="bx bx-arrow-to-left-stroke"></i>
                                <i class="bx bx-chevron-left"></i>

                            </div>
                            <span class="pagination-info">

                                page

                                <span class="pagination-current">1</span>

                                of

                                <span class="pagination-total">3</span>

                            </span>
                            <div class="pagination-right">

                                <i class="bx bx-chevron-right"></i>
                                <i class="bx bx-arrow-to-right-stroke"></i>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="/src/pages/rector/materias.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
